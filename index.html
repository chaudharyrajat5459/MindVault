<!DOCTYPE html>
<html>
<head>
    <title>MindVault | Daily Notes Manager</title>
   <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>


    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>



    <header>
        <div class="logo">
            📝 MindVault
        </div>
        <p class="tagline">
           A Place Where Your Thoughts, Securely Organized.
        </p>
    </header>



    <main class="container">
        <section class="glass-card note-form-card">
            <h2>Add Daily Note</h2>
            <form id="noteForm">
                <div class="input-group">
                    <label for="title">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="Enter note title..."
                        required
                 >
                </div>
                <div class="input-group">
                    <label for="date">Date</label>
                    <input
                        type="date"
                        id="date"
                        name="date"
                        required
                    >
                </div>
                <div class="input-group">
                    <label for="note">Note</label>
                    <textarea
                        id="note"
                        name="note"
                        rows="5"
                        placeholder="Write your note here..."
                        required
                    ></textarea>
                </div>
                <div class="char-counter">
                    <span id="charCount">0</span>/500
                </div>
                <button type="submit" class="save-btn">
                    Save Note
                </button>
            </form>
        </section>



        <div class="notes-header">

        <h2>Your Notes</h2>

            <div class="filters">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search notes..."
                >

            <input
                type="date"
                id="dateFilter"
                >
                <button id="clearFilter">
                Clear
                </button>
            </div>

            </div>
          


            <div id="emptyState" class="empty-state">
                <div class="empty-icon">
                    📝
                </div>
                <h3>No Notes Yet</h3>
                <p>
                    Start writing your first note and it will appear here.
                </p>
            </div>

        

            <div id="notesContainer" class="notes-grid">
            </div>
        </section>
    </main>



    <footer>
        <p>
            Built with HTML, CSS, JavaScript & Node.js
        </p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
